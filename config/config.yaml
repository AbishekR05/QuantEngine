# Global pipeline settings
ticker: "^NSEI"
start_date: "2007-09-17"
end_date: null  # Set to null or empty string to fetch data up to the current date dynamically

# Data storage paths (relative to project root)
db_path: "database/quantengine.db"
raw_data_dir: "data/raw"
processed_data_dir: "data/processed"
features_data_dir: "data/features"
versions_dir: "data/versions"

# Exploratory Data Analysis (EDA) configuration
eda:
  input_files:
    clean: "data/processed/nsei_clean.csv"
    features: "data/features/nifty_features.csv"
  output_dir: "reports/eda/statistics/"
  date_column: "Date"
  statistics:
    exclude_columns:
      - Date
    skew_threshold: 1.0
    kurtosis_threshold: 3.0
  figures:
    output_dir: "reports/eda/figures/"
    dpi: 150
    figure_size:
      - 12
      - 6
    rolling_volatility_window: 21
    ema_periods:
      - 20
      - 50
      - 200
    rsi_overbought: 70
    rsi_oversold: 30
  correlation:
    input_file: "data/features/nifty_features.csv"
    exclude_columns:
      - Date
    high_corr_threshold: 0.9
    leakage_threshold: 0.99
    top_n_pairs: 20
    heatmap_output_dir: "reports/eda/figures/"
    report_output_path: "reports/eda/statistics/correlation_report.md"
  outliers:
    known_events_path: "config/known_events.yaml"
    exclude_columns:
      - Date
    iqr_multiplier: 1.5
    zscore_threshold: 3.0
    top_n_per_column: 20
    output_dir: "reports/eda/figures/outliers/"
    report_output_path: "reports/eda/statistics/outlier_report.md"
  regime:
    input_file: "data/features/nifty_features.csv"
    trend_window: 63
    trend_threshold: 0.05
    vol_window: 21
    vol_high_percentile: 0.75
    vol_low_percentile: 0.25
    known_events_path: "config/known_events.yaml"
    output_report_path: "reports/eda/statistics/regime_report.md"
    output_chart_path: "reports/eda/figures/regime_timeline.png"
  feature_usefulness:
    input_file: "data/features/nifty_features.csv"
    exclude_columns:
      - Date
    correlation_report_source: "reports/eda/statistics/correlation_report.md"
    mi_bins: 10
    output_report_path: "reports/eda/statistics/feature_usefulness_report.md"
