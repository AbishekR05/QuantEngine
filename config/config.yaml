# Global pipeline settings
ticker: "^NSEI"
start_date: "2007-09-17"
end_date: null  # Set to null or empty string to fetch data up to the current date dynamically

# Data storage paths (relative to project root)
db_path: "database/quantengine.db"
raw_data_dir: "data/raw"
processed_data_dir: "data/processed"
features_data_dir: "data/features"
versions_dir: "data/versions"

# Exploratory Data Analysis (EDA) configuration
eda:
  input_files:
    clean: "data/processed/nsei_clean.csv"
    features: "data/features/nifty_features.csv"
  output_dir: "reports/eda/statistics/"
  date_column: "Date"
